services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile.regina
      args:
        BASE_IMAGE: regina-emily-openclaw:base
    image: regina-emily-openclaw:local
    environment:
      HOME: /tmp
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      GOG_KEYRING_PASSWORD: "insecure"
      GOG_KEYRING_BACKEND: file
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./state/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./state/workspace}:/home/node/.openclaw/workspace
      - ./state/config/gog:/tmp/.config/gogcli
      - ./scripts:/home/node/scripts:ro
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      - "35921:35921"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
        "--allow-unconfigured"
      ]

  openclaw-cli:
    image: regina-emily-openclaw:local
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      BROWSER: echo
      APPDATA: /home/node/.config
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./state/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-./state/workspace}:/home/node/.openclaw/workspace
      - ${APPDATA}/gogcli:/home/node/.config/gogcli:ro
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
